<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Sabari Auto Workshop – Trusted car service in Chennai. Oil change, AC repair, engine repair, brake service & more. Book online today!" />
    <meta name="keywords" content="car service Chennai, auto workshop Chennai, car repair Anna Nagar, Sabari workshop" />
    <meta property="og:title" content="Sabari Auto Workshop – Trusted Car Service in Chennai" />
    <meta property="og:description" content="Professional car repairs & maintenance. Certified mechanics, affordable pricing, fast turnaround." />
    <meta property="og:type" content="website" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font — never delays FCP -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    </noscript>

    <style>
      /* Minimal critical CSS — only what's needed before JS loads */
      *,::before,::after{box-sizing:border-box;margin:0;padding:0}
      body{
        font-family:Inter,system-ui,-apple-system,sans-serif;
        background:#fff;
        color:#111;
        -webkit-font-smoothing:antialiased;
      }
      #root{display:flex;flex-direction:column;min-height:100vh}

      /* Navbar shell — sticky white bar, exact h-16 match */
      #shell-nav{
        position:sticky;top:0;z-index:50;
        background:#fff;
        border-bottom:1px solid #e5e7eb;
        height:64px;width:100%;flex-shrink:0;
      }

      /* Content shell — fills remaining viewport, no CLS on any route */
      #shell-main{
        flex:1;background:#fff;
        min-height:calc(100vh - 64px);
      }
    </style>

    <title>Sabari Auto Workshop – Car Service in Chennai</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="shell-nav"></div>
      <div id="shell-main"></div>
    </div>
  </body>
</html>
