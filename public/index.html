<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="Sabari Auto Workshop - Trusted car service in Chennai. Oil change, AC repair, engine repair, brake service and more. Book online today!"
    />
    <meta
      property="og:title"
      content="Sabari Auto Workshop - Trusted Car Service in Chennai"
    />
    <meta
      property="og:description"
      content="Professional car repairs and maintenance. Certified mechanics, affordable pricing, fast turnaround."
    />
    <meta property="og:type" content="website" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      media="print" onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <style>
      *,::before,::after{box-sizing:border-box;margin:0;padding:0}
      body{
        font-family:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        background:#fff;color:#111;
        -webkit-font-smoothing:antialiased;
        text-rendering:optimizeLegibility;
      }
      #root{display:flex;flex-direction:column;min-height:100vh}
      #shell-nav{
        position:sticky;top:0;z-index:50;
        background:#fff;border-bottom:1px solid #e5e7eb;
        height:64px;width:100%;flex-shrink:0;
        display:flex;align-items:center;padding:0 1rem;
      }
      #shell-logo{
        display:flex;align-items:center;gap:10px;text-decoration:none;
      }
      #shell-logo-icon{
        width:36px;height:36px;border-radius:10px;
        background:#ff3b3b;display:flex;align-items:center;justify-content:center;
        flex-shrink:0;
      }
      #shell-logo-text{
        font-size:15px;font-weight:900;color:#0f0f0f;
        letter-spacing:-0.03em;
        font-family:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      }
      #shell-logo-text span{color:#ff3b3b;}
      #shell-main{flex:1;background:#fff;min-height:calc(100vh - 64px);}
    </style>

    <title>Sabari Auto Workshop - Car Service in Chennai</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="shell-nav">
        <a id="shell-logo" href="/">
          <div id="shell-logo-icon">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
            </svg>
          </div>
          <div id="shell-logo-text">Sabari <span>Auto</span></div>
        </a>
      </div>
      <div id="shell-main"></div>
    </div>
  </body>
</html>
