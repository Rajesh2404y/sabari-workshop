<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Sabari Auto Workshop – Trusted car service in Chennai. Oil change, AC repair, engine repair, brake service & more. Book online today!" />
    <meta name="keywords" content="car service Chennai, auto workshop Chennai, car repair Anna Nagar, Sabari workshop" />
    <meta property="og:title" content="Sabari Auto Workshop – Trusted Car Service in Chennai" />
    <meta property="og:description" content="Professional car repairs & maintenance. Certified mechanics, affordable pricing, fast turnaround." />
    <meta property="og:type" content="website" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load — does NOT block FCP -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    </noscript>

    <!--
      CRITICAL CSS — painted by browser BEFORE any JS loads.
      Every value here must exactly match the React-rendered output
      to prevent Cumulative Layout Shift (CLS).
    -->
    <style>
      /* Reset */
      *,::before,::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth}
      body{
        font-family:Inter,system-ui,-apple-system,sans-serif;
        background:#fff;
        color:#111;
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
      }

      /* Root flex column — matches App.js wrapper */
      #root{
        display:flex;
        flex-direction:column;
        min-height:100vh;
      }

      /*
        Navbar shell — EXACTLY matches Navbar.js:
        sticky, top-0, z-50, bg-white, border-b border-gray-200, h-16
        Pre-painting this prevents the hero from jumping down when nav renders.
      */
      #shell-nav{
        position:sticky;
        top:0;
        z-index:50;
        background:#fff;
        border-bottom:1px solid #e5e7eb;
        height:64px;
        width:100%;
        flex-shrink:0;
      }

      /*
        Hero shell — EXACTLY matches Home.js hero section:
        bg-[#0f0f0f], height:560px, contain:layout size
        Pre-painting this prevents content below from shifting up.
      */
      #shell-hero{
        background:#0f0f0f;
        height:560px;
        width:100%;
        contain:layout size;
        flex-shrink:0;
      }

      /* Main content area grows to fill remaining space */
      #shell-main{
        flex:1;
        background:#fff;
      }
    </style>

    <title>Sabari Auto Workshop – Car Service in Chennai</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!--
      Pre-rendered shell — visible INSTANTLY before React loads.
      React replaces #root content on hydration.
      Shell elements have exact same dimensions as real components
      so there is ZERO layout shift (CLS = 0).
    -->
    <div id="root">
      <div id="shell-nav"></div>
      <div id="shell-main">
        <div id="shell-hero"></div>
      </div>
    </div>
  </body>
</html>
